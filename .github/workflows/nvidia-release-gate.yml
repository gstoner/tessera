name: NVIDIA sm_120 release gate

on:
  pull_request:
    paths:
      - '.github/workflows/nvidia-release-gate.yml'
      - 'benchmarks/nvidia/**'
      - 'docs/audit/backend/nvidia/**'
      - 'python/tessera/compiler/**'
      - 'python/tessera/runtime.py'
      - 'scripts/run_nvidia_release_gate.sh'
      - 'src/compiler/codegen/tessera_gpu_backend_NVIDIA/**'
      - 'tests/_support/**'
      - 'tests/unit/test_nvidia_*.py'
      - 'tests/unit/test_paged_kv_nvidia_native.py'
      - 'tests/unit/test_ssm_nvidia_replay.py'
  workflow_dispatch:

# The NVIDIA box is a singleton.  Do not overlap context-owning CUDA jobs from
# different PRs, and do not cancel an active proof after it has allocated the
# device: its retained report is diagnostic evidence.
concurrency:
  group: nvidia-sm120-release-gate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-gate:
    name: NVIDIA sm_120 (CPU, artifact, device, performance)
    # This is evidence for one physical device, not a generic CUDA lane.
    runs-on: [self-hosted, linux, nvidia-rtx5070ti-sm120]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Run NVIDIA release gate
        env:
          TESSERA_NVIDIA_REPORT_DIR: artifacts/nvidia-release
        run: bash scripts/run_nvidia_release_gate.sh

      - name: Retain NVIDIA proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-sm120-release-${{ github.run_id }}
          path: artifacts/nvidia-release/
          retention-days: 30
          if-no-files-found: warn
