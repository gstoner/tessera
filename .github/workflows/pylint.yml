name: Pylint

# PRs are the gate; push runs only on main as a post-merge safety net (was
# `on: [push]` on every branch with no concurrency — so PR'd branches ran twice
# and rapid pushes piled up uncancelled). Pre-PR CI: open a draft PR.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: pylint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token: this job only reads the repo to lint it.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    # Advisory only.  Tessera lints/types via ruff + mypy in the Python Quality
    # workflow and scripts/validate.sh; pylint runs unconfigured here purely to
    # surface findings, so it must not gate CI (--exit-zero) and it scopes to the
    # shipped package (the archive/ tree is excluded from all build targets).
    - name: Analysing the code with pylint
      run: |
        pylint --exit-zero python/tessera
