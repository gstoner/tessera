name: Python Quality

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: python-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install \
            "numpy>=1.21.0,<2.0.0" \
            "pytest>=7.0.0" \
            "pyyaml>=6.0.0" \
            "click>=8.0.0" \
            "rich>=12.0.0" \
            "tqdm>=4.64.0" \
            "scipy>=1.9.0" \
            "matplotlib>=3.5.0" \
            "ml_dtypes>=0.4.0"

      - name: Compile Python sources
        run: |
          python -m compileall -q python tests/unit scripts benchmarks

      - name: Lint active documentation terminology
        run: |
          scripts/lint_docs.sh
