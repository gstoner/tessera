# Glass-jaw #12 (2026-06-01) — drift gate for generated audit docs.
#
# A manifest / registry / C-ABI edit that changes the audit dashboards must be
# committed together with the regenerated docs. This hook runs the same
# `--check` gate the CI audit lane runs (scripts/check_generated_docs.sh), so
# drift is caught locally before it reaches CI.
#
# Two ways to activate (pick one):
#   * Zero-dependency (no `pre-commit` tool):  bash scripts/install-git-hooks.sh
#     → points core.hooksPath at .githooks/; .githooks/pre-push runs this gate.
#   * pre-commit framework:  pre-commit install --hook-type pre-push
#
# Staged at PRE-PUSH, not pre-commit: the full drift check is ~30s (it
# regenerates every dashboard in-memory and byte-compares), which is too heavy
# per-commit but fine per-push — and push is where CI bites. `language: system`
# uses the repo's python3 + the script's own PYTHONPATH bootstrap (no venv).
default_install_hook_types: [pre-push]
repos:
  - repo: local
    hooks:
      - id: generated-doc-drift
        name: generated-doc drift (audit dashboards)
        entry: scripts/check_generated_docs.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
